<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CYBERPUNK 2077: Database Warriors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconify -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <style>
      /* [SAME STYLES AS BEFORE - tetap sama untuk menghemat space] */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --neon-pink: #ff00ff;
        --neon-blue: #00ffff;
        --neon-purple: #b300ff;
        --neon-yellow: #ffff00;
        --dark-bg: #0a0a0f;
      }

      body {
        font-family: "Rajdhani", sans-serif;
        background: var(--dark-bg);
        color: #fff;
      }

      /* Cyber Card */
      .cyber-card {
        background: rgba(10, 10, 15, 0.8);
        backdrop-filter: blur(10px);
        border: 2px solid var(--neon-blue);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        clip-path: polygon(0 0, 100% 0, 100% 95%, 95% 100%, 0 100%);
        padding: 24px;
      }

      /* Cyber Button */
      .cyber-button {
        background: transparent;
        color: var(--neon-blue);
        font-family: "Orbitron", sans-serif;
        font-weight: 700;
        padding: 16px 32px;
        border: 2px solid var(--neon-blue);
        cursor: pointer;
        clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
      }

      .cyber-button:hover {
        background: var(--neon-blue);
        color: var(--dark-bg);
        box-shadow: 0 0 30px var(--neon-blue);
      }

      .cyber-button-outline {
        background: transparent;
        border: 2px solid var(--neon-pink);
        color: var(--neon-pink);
        padding: 14px 28px;
        clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
      }

      .cyber-button-outline:hover {
        background: var(--neon-pink);
        color: var(--dark-bg);
      }

      /* Answer Option */
      .answer-cyber {
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid var(--neon-blue);
        padding: 20px;
        cursor: pointer;
        transition: all 0.2s;
        clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
      }

      .answer-cyber:hover {
        border-color: var(--neon-pink);
        box-shadow: 0 0 20px var(--neon-pink);
      }

      .answer-cyber.correct {
        border-color: #00ff00;
        box-shadow: 0 0 30px #00ff00;
      }

      .answer-cyber.wrong {
        border-color: #ff0000;
        box-shadow: 0 0 30px #ff0000;
      }

      /* Cyber Timer */
      .cyber-timer {
        background: rgba(0, 0, 0, 0.8);
        border: 3px solid var(--neon-blue);
        padding: 15px 30px;
        font-size: 48px;
        font-family: "Orbitron", sans-serif;
        color: var(--neon-blue);
        text-shadow: 0 0 20px var(--neon-blue);
        clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
      }

      /* Room Code */
      .room-code-cyber {
        background: linear-gradient(
          135deg,
          var(--neon-blue),
          var(--neon-purple)
        );
        padding: 20px 40px;
        font-size: 48px;
        font-family: "Orbitron", sans-serif;
        font-weight: 900;
        letter-spacing: 10px;
        color: var(--dark-bg);
        clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
      }

      /* Input */
      .cyber-input {
        background: rgba(0, 0, 0, 0.5);
        border: 2px solid var(--neon-blue);
        padding: 16px 24px;
        font-size: 18px;
        width: 100%;
        color: var(--neon-blue);
        font-family: "Orbitron", sans-serif;
        clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
      }

      .cyber-input:focus {
        outline: none;
        border-color: var(--neon-pink);
        box-shadow: 0 0 30px var(--neon-pink);
      }

      /* Modal */
      .cyber-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }

      .cyber-modal.active {
        display: flex;
      }

      .cyber-modal-content {
        background: var(--dark-bg);
        border: 3px solid var(--neon-blue);
        padding: 40px;
        max-width: 800px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 0 50px var(--neon-blue);
        clip-path: polygon(0 0, 100% 0, 100% 95%, 95% 100%, 0 100%);
      }

      /* JSON Editor */
      .json-editor {
        background: #1e1e1e;
        border: 2px solid var(--neon-blue);
        color: #00ff00;
        font-family: "Courier New", monospace;
        font-size: 14px;
        padding: 15px;
        width: 100%;
        min-height: 400px;
        clip-path: polygon(0 0, 100% 0, 100% 95%, 95% 100%, 0 100%);
      }

      .tab-button {
        background: transparent;
        border: 2px solid var(--neon-blue);
        color: var(--neon-blue);
        padding: 10px 20px;
        font-family: "Orbitron", sans-serif;
        cursor: pointer;
        clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
      }

      .tab-button.active {
        background: var(--neon-blue);
        color: var(--dark-bg);
      }

      .question-preview {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--neon-blue);
        padding: 15px;
        margin-bottom: 15px;
        clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
      }

      /* Rank Item */
      .rank-cyber {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid var(--neon-blue);
        padding: 15px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 15px;
        clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
      }

      .rank-cyber.current-user {
        border-color: var(--neon-yellow);
        box-shadow: 0 0 30px var(--neon-yellow);
      }
    </style>
  </head>
  <body>
    <!-- Camera Container -->
    <div
      id="camera-container"
      style="
        display: none;
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 250px;
        height: 180px;
        border: 3px solid var(--neon-blue);
        z-index: 1000;
      "
    >
      <video
        id="camera-feed"
        autoplay
        playsinline
        muted
        style="width: 100%; height: 100%; object-fit: cover"
      ></video>
    </div>

    <!-- Disqualified Screen -->
    <div id="disqualified-screen" class="cyber-modal">
      <div class="cyber-modal-content text-center">
        <h2 class="text-5xl font-bold mb-4 neon-text-pink">DISKUALIFIKASI</h2>
        <p class="text-xl mb-6" id="disqualify-reason"></p>
        <button onclick="location.reload()" class="cyber-button">REBOOT</button>
      </div>
    </div>

    <!-- Main Container -->
    <div class="container mx-auto px-4 py-6 max-w-6xl">
      <!-- Header -->
      <div class="cyber-card mb-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <div class="text-2xl">💾</div>
          <div>
            <h1 class="text-3xl font-bold">
              <span class="neon-text-blue">CYBERPUNK</span>
              <span class="neon-text-pink"> 2077</span>
            </h1>
          </div>
        </div>

        <!-- Game Stats -->
        <div id="stats-bar" class="hidden items-center gap-6">
          <div class="text-right">
            <p class="text-gray-500 text-xs">PLAYER</p>
            <p
              id="display-team-name"
              class="font-bold text-xl neon-text-blue"
            ></p>
          </div>
          <div class="text-right">
            <p class="text-gray-500 text-xs">SCORE</p>
            <p id="display-score" class="font-bold text-2xl neon-text-yellow">
              0
            </p>
          </div>
          <div class="text-right">
            <p class="text-gray-500 text-xs">RANK</p>
            <p id="display-rank" class="font-bold text-xl neon-text-purple">
              #0
            </p>
          </div>
        </div>
      </div>

      <!-- Question Editor Modal -->
      <div id="question-editor-modal" class="cyber-modal">
        <div class="cyber-modal-content">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold neon-text-blue">QUESTION EDITOR</h2>
            <button
              onclick="toggleQuestionEditor()"
              class="text-2xl text-gray-500 hover:text-neon-pink"
            >
              &times;
            </button>
          </div>

          <!-- Tabs -->
          <div class="flex gap-2 mb-6">
            <button
              class="tab-button active"
              onclick="switchEditorTab('visual')"
              id="tab-visual"
            >
              VISUAL
            </button>
            <button
              class="tab-button"
              onclick="switchEditorTab('json')"
              id="tab-json"
            >
              JSON
            </button>
            <button
              class="tab-button"
              onclick="switchEditorTab('import')"
              id="tab-import"
            >
              IMPORT
            </button>
          </div>

          <!-- Visual Editor Tab -->
          <div id="visual-editor-tab">
            <div
              id="questions-list"
              class="space-y-3 max-h-96 overflow-y-auto pr-2"
            >
              <!-- Questions will be dynamically added here -->
            </div>
            <button onclick="addNewQuestion()" class="cyber-button w-full mt-4">
              + ADD QUESTION
            </button>
          </div>

          <!-- JSON Editor Tab -->
          <div id="json-editor-tab" class="hidden">
            <textarea
              id="json-editor"
              class="json-editor"
              spellcheck="false"
            ></textarea>
            <div class="flex gap-3 mt-4">
              <button onclick="applyJsonChanges()" class="cyber-button flex-1">
                APPLY
              </button>
              <button
                onclick="validateJson()"
                class="cyber-button-outline flex-1"
              >
                VALIDATE
              </button>
            </div>
          </div>

          <!-- Import/Export Tab -->
          <div id="import-export-tab" class="hidden">
            <div class="space-y-4">
              <button onclick="exportQuestions()" class="cyber-button w-full">
                DOWNLOAD JSON
              </button>
              <input
                type="file"
                id="import-file"
                accept=".json"
                class="hidden"
                onchange="importQuestions(this)"
              />
              <button
                onclick="document.getElementById('import-file').click()"
                class="cyber-button-outline w-full"
              >
                UPLOAD JSON
              </button>
            </div>
          </div>

          <div class="flex justify-end gap-3 mt-6">
            <button onclick="saveQuestions()" class="cyber-button">
              SAVE TO ROOM
            </button>
            <button onclick="resetToDefault()" class="cyber-button-outline">
              RESET
            </button>
          </div>
        </div>
      </div>

      <!-- Lobby Screen -->
      <div
        id="screen-lobby"
        class="min-h-[600px] flex items-center justify-center"
      >
        <div class="cyber-card max-w-md w-full">
          <div class="text-center mb-8">
            <div class="text-7xl mb-4 neon-text-blue">⌨️</div>
            <h2 class="text-4xl font-bold mb-2 neon-text-blue">INITIALIZE</h2>
          </div>

          <div class="space-y-4">
            <!-- Room Code -->
            <div>
              <label class="block text-gray-400 text-sm mb-2">ROOM CODE</label>
              <div class="flex gap-2">
                <input
                  type="text"
                  id="input-room-code"
                  maxlength="6"
                  placeholder="XXXXXX"
                  class="cyber-input text-center text-2xl font-bold uppercase"
                />
                <button
                  onclick="generateRoomCode()"
                  class="cyber-button-outline px-6"
                >
                  GEN
                </button>
              </div>
            </div>

            <!-- Nickname -->
            <div>
              <label class="block text-gray-400 text-sm mb-2">NICKNAME</label>
              <input
                type="text"
                id="input-team-name"
                placeholder="Enter your name"
                class="cyber-input"
              />
            </div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-2 gap-3 pt-4">
              <button
                onclick="createRoom()"
                class="cyber-button"
                id="create-room-btn"
              >
                CREATE
              </button>
              <button
                onclick="joinRoom()"
                class="cyber-button-outline"
                id="join-room-btn"
              >
                JOIN
              </button>
            </div>

            <!-- Room Status -->
            <div
              id="room-status-display"
              class="hidden mt-6 p-6 bg-black/50 border border-neon-blue"
            >
              <div class="text-center mb-4">
                <div class="room-code-cyber text-3xl" id="display-room-code">
                  DEFAULT
                </div>
                <button onclick="copyRoomCode()" class="mt-3 text-neon-blue">
                  📋 COPY
                </button>
              </div>

              <div class="flex justify-between mb-4">
                <span>STATUS:</span>
                <span id="room-status-text" class="text-neon-yellow"
                  >WAITING</span
                >
              </div>

              <!-- Question Info -->
              <div class="mb-4 p-3 bg-black/50 border border-neon-purple">
                <div class="flex justify-between">
                  <span>Questions:</span>
                  <span id="total-questions" class="text-neon-yellow">0</span>
                </div>
              </div>

              <div class="mb-4">
                <h3 class="mb-3">PLAYERS:</h3>
                <div
                  id="participants-list-waiting"
                  class="space-y-2 max-h-48 overflow-y-auto"
                ></div>
              </div>

              <button
                id="btn-start"
                onclick="startGame()"
                disabled
                class="cyber-button w-full"
              >
                START GAME
              </button>
            </div>

            <!-- Error Message -->
            <div
              id="error-message"
              class="hidden p-3 bg-red-900/50 border border-red-500 text-red-500"
            ></div>
          </div>
        </div>
      </div>

      <!-- Game Screen -->
      <div id="screen-game" class="hidden">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <!-- Main Game Area -->
          <div class="lg:col-span-3 space-y-4">
            <div class="cyber-card">
              <div class="flex justify-between items-center mb-6">
                <span
                  id="question-category"
                  class="px-4 py-2 border border-neon-blue text-neon-blue"
                  >LOADING...</span
                >
                <div class="cyber-timer"><span id="timer-text">30</span></div>
              </div>
              <p id="question-text" class="text-2xl font-bold mb-8">
                Loading question...
              </p>
              <div class="flex justify-between">
                <span id="question-progress">0/0</span>
                <span id="question-points" class="text-neon-yellow">+0</span>
              </div>
            </div>

            <div
              id="answers-grid"
              class="grid grid-cols-1 md:grid-cols-2 gap-4"
            ></div>
            <div
              id="feedback"
              class="hidden p-6 text-center font-bold text-xl border-2"
            ></div>
          </div>

          <!-- Sidebar -->
          <div class="lg:col-span-1 space-y-4">
            <div class="cyber-card">
              <h3 class="font-bold text-lg mb-4 neon-text-purple">RANKINGS</h3>
              <div
                id="leaderboard"
                class="space-y-2 max-h-96 overflow-y-auto"
              ></div>
            </div>

            <div class="cyber-card">
              <div class="flex justify-between mb-2">
                <span>ROOM:</span>
                <span id="current-room-code" class="text-neon-blue">---</span>
              </div>
              <div class="flex justify-between">
                <span>PLAYERS:</span>
                <span id="participant-count" class="text-neon-purple">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Results Screen -->
      <div id="screen-results" class="hidden">
        <div class="max-w-4xl mx-auto">
          <div class="cyber-card text-center p-12">
            <h2 class="text-6xl font-bold mb-2 neon-text-blue">GAME OVER</h2>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
            <div class="cyber-card text-center p-8">
              <p class="text-gray-400 mb-2">PLAYER</p>
              <p id="res-team-name" class="text-3xl font-bold neon-text-blue">
                -
              </p>
            </div>
            <div class="cyber-card text-center p-8">
              <p class="text-gray-400 mb-2">SCORE</p>
              <p id="res-score" class="text-5xl font-bold neon-text-yellow">
                0
              </p>
            </div>
            <div class="cyber-card text-center p-8">
              <p class="text-gray-400 mb-2">RANK</p>
              <p id="res-rank" class="text-4xl font-bold neon-text-purple">
                #0
              </p>
            </div>
          </div>

          <div class="cyber-card p-8 mt-6">
            <h3 class="text-2xl font-bold mb-6 neon-text-purple">
              FINAL RANKINGS
            </h3>
            <div id="final-leaderboard" class="space-y-2"></div>
            <div class="mt-8 text-center">
              <button onclick="location.reload()" class="cyber-button px-12">
                PLAY AGAIN
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Admin Panel Button -->
    <div class="fixed bottom-6 right-6 z-50 flex gap-3">
      <button
        onclick="toggleQuestionEditor()"
        class="cyber-button w-14 h-14 p-0 text-2xl"
      >
        📝
      </button>
      <button
        onclick="toggleAdminPanel()"
        class="cyber-button w-14 h-14 p-0 text-2xl"
      >
        👑
      </button>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="cyber-modal">
      <div class="cyber-modal-content">
        <h2 class="text-2xl font-bold mb-6 neon-text-purple">ADMIN MONITOR</h2>
        <div class="mb-4">
          <input
            type="text"
            id="admin-room-code"
            placeholder="ROOM CODE"
            class="cyber-input"
          />
          <button onclick="monitorRoom()" class="cyber-button mt-2 w-full">
            MONITOR
          </button>
        </div>
        <div
          id="admin-participants-list"
          class="space-y-2 max-h-96 overflow-y-auto"
        ></div>
      </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas
      id="confetti"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
      "
    ></canvas>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        updateDoc,
        collection,
        onSnapshot,
        increment,
        getDoc,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      // Firebase Config
      const firebaseConfig = {
        apiKey: "AIzaSyD73uPU8es-9EK2EXl3zj8hpcXPwpAu_xk",
        authDomain: "game-basis-data.firebaseapp.com",
        projectId: "game-basis-data",
        storageBucket: "game-basis-data.firebasestorage.app",
        messagingSenderId: "645027573181",
        appId: "1:645027573181:web:79f2388ebd4849c6a8f6d4",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Game State
      let currentUser = null;
      let currentRoom = null;
      let currentNickname = "";
      let isAdmin = false;
      let score = 0;
      let qIdx = 0;
      let timer;
      let timeLeft;
      let currentStreak = 0;
      let participants = [];

      // Default Questions - PASTIKAN VARIABEL INI GLOBAL
      window.questions = [
        {
          q: "What is the capital of Indonesia?",
          a: ["JAKARTA", "SURABAYA", "BANDUNG", "MEDAN"],
          correct: 0,
          category: "GEOGRAPHY",
          time: 30,
          points: 1000,
        },
        {
          q: "Who invented the light bulb?",
          a: ["TESLA", "EDISON", "BELL", "EINSTEIN"],
          correct: 1,
          category: "SCIENCE",
          time: 30,
          points: 1000,
        },
        {
          q: "Which animal can fly?",
          a: ["CAT", "DOG", "BIRD", "FISH"],
          correct: 2,
          category: "BIOLOGY",
          time: 20,
          points: 800,
        },
      ];

      // Auth
      signInAnonymously(auth).catch(console.error);

      onAuthStateChanged(auth, (user) => {
        if (user) {
          currentUser = user;
          console.log("User:", user.uid);
        }
      });

      // ==================== ROOM MANAGEMENT ====================

      window.generateRoomCode = () => {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let code = "";
        for (let i = 0; i < 6; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById("input-room-code").value = code;
        return code;
      };

      window.copyRoomCode = () => {
        const code = document.getElementById("display-room-code").innerText;
        navigator.clipboard.writeText(code);
        alert("Code copied!");
      };

      window.createRoom = async () => {
        const roomCode =
          document
            .getElementById("input-room-code")
            .value.trim()
            .toUpperCase() || generateRoomCode();
        const nickname = document
          .getElementById("input-team-name")
          .value.trim();

        if (!nickname) return alert("Enter your name!");

        try {
          await setDoc(doc(db, "rooms", roomCode), {
            createdBy: currentUser.uid,
            createdByName: nickname,
            createdAt: Date.now(),
            status: "waiting",
            participants: 1,
            questions: window.questions, // SIMPAN QUESTIONS KE ROOM
          });

          await setDoc(
            doc(db, "rooms", roomCode, "participants", currentUser.uid),
            {
              name: nickname,
              uid: currentUser.uid,
              score: 0,
              streak: 0,
              joinedAt: Date.now(),
              isAdmin: true,
            },
          );

          currentRoom = roomCode;
          currentNickname = nickname;
          isAdmin = true;

          // Update UI
          document.getElementById("display-team-name").innerText = nickname;
          document.getElementById("display-room-code").innerText = roomCode;
          document
            .getElementById("room-status-display")
            .classList.remove("hidden");
          document.getElementById("btn-start").disabled = false;
          document.getElementById("total-questions").innerText =
            window.questions.length;

          listenToRoom(roomCode);
          alert("Room created!");
        } catch (error) {
          console.error(error);
          alert("Failed to create room");
        }
      };

      window.joinRoom = async () => {
        const roomCode = document
          .getElementById("input-room-code")
          .value.trim()
          .toUpperCase();
        const nickname = document
          .getElementById("input-team-name")
          .value.trim();

        if (!roomCode || !nickname) return alert("Enter room code and name!");

        try {
          const roomRef = doc(db, "rooms", roomCode);
          const roomSnap = await getDoc(roomRef);

          if (!roomSnap.exists()) return alert("Room not found!");

          const roomData = roomSnap.data();

          await setDoc(
            doc(db, "rooms", roomCode, "participants", currentUser.uid),
            {
              name: nickname,
              uid: currentUser.uid,
              score: 0,
              streak: 0,
              joinedAt: Date.now(),
              isAdmin: false,
            },
          );

          await updateDoc(roomRef, { participants: increment(1) });

          currentRoom = roomCode;
          currentNickname = nickname;
          isAdmin = false;

          // LOAD QUESTIONS FROM ROOM
          if (roomData.questions) {
            window.questions = roomData.questions;
          }

          document.getElementById("display-team-name").innerText = nickname;
          document.getElementById("display-room-code").innerText = roomCode;
          document
            .getElementById("room-status-display")
            .classList.remove("hidden");
          document.getElementById("btn-start").disabled = true;
          document.getElementById("total-questions").innerText =
            window.questions.length;

          listenToRoom(roomCode);
          listenForGameStart(roomCode);
        } catch (error) {
          console.error(error);
          alert("Failed to join room");
        }
      };

      function listenToRoom(roomCode) {
        onSnapshot(
          collection(db, "rooms", roomCode, "participants"),
          (snapshot) => {
            participants = [];
            snapshot.forEach((doc) =>
              participants.push({ id: doc.id, ...doc.data() }),
            );

            // Update waiting list
            const waitingList = document.getElementById(
              "participants-list-waiting",
            );
            if (waitingList) {
              waitingList.innerHTML = participants
                .map(
                  (p) => `
                        <div class="p-2 bg-black/50 border border-neon-blue">
                            ${p.name} ${p.isAdmin ? "(ADMIN)" : ""}
                        </div>
                    `,
                )
                .join("");
            }

            document.getElementById("participant-count").innerText =
              participants.length;
            updateLeaderboard();
          },
        );
      }

      function listenForGameStart(roomCode) {
        onSnapshot(doc(db, "rooms", roomCode), (doc) => {
          const data = doc.data();
          if (data && data.status === "in-progress" && !isAdmin) {
            // LOAD QUESTIONS FROM ROOM
            if (data.questions) {
              window.questions = data.questions;
            }

            document.getElementById("screen-lobby").classList.add("hidden");
            document.getElementById("screen-game").classList.remove("hidden");
            document.getElementById("stats-bar").classList.remove("hidden");

            score = 0;
            qIdx = 0;
            loadQuestion();
          }
        });
      }

      window.startGame = async () => {
        if (!currentRoom || !isAdmin) return;

        try {
          // SAVE CURRENT QUESTIONS TO ROOM BEFORE STARTING
          await updateDoc(doc(db, "rooms", currentRoom), {
            status: "in-progress",
            startedAt: Date.now(),
            questions: window.questions, // PASTIKAN QUESTIONS TERSIMPAN
          });

          document.getElementById("screen-lobby").classList.add("hidden");
          document.getElementById("screen-game").classList.remove("hidden");
          document.getElementById("stats-bar").classList.remove("hidden");

          // Admin mode
          document.getElementById("answers-grid").innerHTML =
            '<div class="col-span-2 text-center p-12">ADMIN MODE - MONITORING ONLY</div>';
        } catch (error) {
          console.error(error);
          alert("Failed to start game");
        }
      };

      // ==================== GAME FUNCTIONS ====================

      function loadQuestion() {
        if (isAdmin) return;

        if (qIdx >= window.questions.length) {
          finish();
          return;
        }

        const q = window.questions[qIdx];

        document.getElementById("question-category").innerText = q.category;
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("question-progress").innerText =
          `${qIdx + 1}/${window.questions.length}`;
        document.getElementById("question-points").innerText = `+${q.points}`;

        const grid = document.getElementById("answers-grid");
        grid.innerHTML = "";

        q.a.forEach((answer, index) => {
          const option = document.createElement("div");
          option.className = "answer-cyber";
          option.innerHTML = `<div class="flex items-center justify-center gap-3"><span class="w-8 h-8 bg-black border border-neon-blue flex items-center justify-center">${String.fromCharCode(65 + index)}</span><span>${answer}</span></div>`;
          option.onclick = () => checkAnswer(index);
          grid.appendChild(option);
        });

        startTimer(q.time);
      }

      function startTimer(seconds) {
        clearInterval(timer);
        timeLeft = seconds;
        document.getElementById("timer-text").innerText = timeLeft;

        timer = setInterval(() => {
          timeLeft--;
          document.getElementById("timer-text").innerText = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(timer);
            checkAnswer(-1);
          }
        }, 1000);
      }

      async function checkAnswer(selectedIndex) {
        clearInterval(timer);

        const q = window.questions[qIdx];
        const isCorrect = selectedIndex === q.correct;

        document
          .querySelectorAll(".answer-cyber")
          .forEach((opt) => (opt.style.pointerEvents = "none"));

        if (isCorrect) {
          currentStreak++;
          const points = q.points + timeLeft * 10;
          score += points;

          document.getElementById("feedback").className =
            "p-6 text-center font-bold text-xl border-2 border-green-500 bg-black/50 text-green-500";
          document.getElementById("feedback").innerHTML = `✅ +${points}`;
        } else {
          currentStreak = 0;
          score = Math.max(0, score - 200);

          document.getElementById("feedback").className =
            "p-6 text-center font-bold text-xl border-2 border-red-500 bg-black/50 text-red-500";
          document.getElementById("feedback").innerHTML = "❌ -200";
        }

        document.getElementById("feedback").classList.remove("hidden");
        document.getElementById("display-score").innerText = score;

        try {
          await updateDoc(
            doc(db, "rooms", currentRoom, "participants", currentUser.uid),
            {
              score: score,
              streak: currentStreak,
            },
          );
        } catch (e) {}

        setTimeout(() => {
          qIdx++;
          document.getElementById("feedback").classList.add("hidden");
          loadQuestion();
        }, 1500);
      }

      function updateLeaderboard() {
        const sorted = [...participants]
          .filter((p) => !p.isAdmin)
          .sort((a, b) => b.score - a.score);

        const leaderboardEl = document.getElementById("leaderboard");
        if (leaderboardEl) {
          leaderboardEl.innerHTML = sorted
            .map(
              (p, i) => `
                    <div class="rank-cyber ${p.name === currentNickname ? "current-user" : ""}">
                        <span class="text-2xl w-10">#${i + 1}</span>
                        <div class="flex-1 font-bold">${p.name}</div>
                        <div class="font-bold text-neon-purple">${p.score}</div>
                    </div>
                `,
            )
            .join("");
        }
      }

      function finish() {
        document.getElementById("screen-game").classList.add("hidden");
        document.getElementById("screen-results").classList.remove("hidden");

        document.getElementById("res-team-name").innerText = currentNickname;
        document.getElementById("res-score").innerText = score;

        const sorted = participants
          .filter((p) => !p.isAdmin)
          .sort((a, b) => b.score - a.score);
        const myRank = sorted.findIndex((p) => p.name === currentNickname) + 1;
        document.getElementById("res-rank").innerText = `#${myRank}`;

        const finalEl = document.getElementById("final-leaderboard");
        finalEl.innerHTML = sorted
          .map(
            (p, i) => `
                <div class="rank-cyber ${p.name === currentNickname ? "current-user" : ""}">
                    <span class="text-3xl w-12">#${i + 1}</span>
                    <div class="flex-1 font-bold text-lg">${p.name}</div>
                    <div class="font-bold text-neon-purple text-2xl">${p.score}</div>
                </div>
            `,
          )
          .join("");
      }

      // ==================== QUESTION EDITOR - YANG DIPERBAIKI ====================

      window.toggleQuestionEditor = () => {
        document
          .getElementById("question-editor-modal")
          .classList.toggle("active");
        if (
          document
            .getElementById("question-editor-modal")
            .classList.contains("active")
        ) {
          renderVisualEditor();
          updateJsonEditor();
        }
      };

      window.switchEditorTab = (tab) => {
        document
          .querySelectorAll(".tab-button")
          .forEach((btn) => btn.classList.remove("active"));
        document.getElementById(`tab-${tab}`).classList.add("active");

        document.getElementById("visual-editor-tab").classList.add("hidden");
        document.getElementById("json-editor-tab").classList.add("hidden");
        document.getElementById("import-export-tab").classList.add("hidden");

        document.getElementById(`${tab}-editor-tab`).classList.remove("hidden");

        if (tab === "visual") renderVisualEditor();
        else if (tab === "json") updateJsonEditor();
      };

      function renderVisualEditor() {
        const container = document.getElementById("questions-list");
        container.innerHTML = window.questions
          .map(
            (q, index) => `
                <div class="question-preview">
                    <div class="flex justify-between items-start mb-2">
                        <input type="text" value="${q.q.replace(/"/g, "&quot;")}" 
                               onchange="window.updateQuestion(${index}, 'q', this.value)"
                               class="cyber-input text-sm mb-2" placeholder="Question">
                        <button onclick="window.deleteQuestion(${index})" class="text-neon-pink ml-2 text-xl">🗑️</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        ${q.a
                          .map(
                            (answer, ansIndex) => `
                            <div class="flex items-center gap-1">
                                <input type="radio" name="correct-${index}" value="${ansIndex}" 
                                       ${q.correct === ansIndex ? "checked" : ""}
                                       onchange="window.setCorrectAnswer(${index}, ${ansIndex})"
                                       class="w-4 h-4">
                                <input type="text" value="${answer}" 
                                       onchange="window.updateAnswer(${index}, ${ansIndex}, this.value)"
                                       class="cyber-input text-xs flex-1" placeholder="Option ${ansIndex + 1}">
                            </div>
                        `,
                          )
                          .join("")}
                    </div>
                    
                    <div class="flex gap-2">
                        <input type="text" value="${q.category}" 
                               onchange="window.updateQuestion(${index}, 'category', this.value)"
                               class="cyber-input text-xs flex-1" placeholder="Category">
                        <input type="number" value="${q.time}" min="5" max="120"
                               onchange="window.updateQuestion(${index}, 'time', parseInt(this.value))"
                               class="cyber-input text-xs w-20" placeholder="Time">
                        <input type="number" value="${q.points}" min="100" max="5000"
                               onchange="window.updateQuestion(${index}, 'points', parseInt(this.value))"
                               class="cyber-input text-xs w-20" placeholder="Points">
                    </div>
                </div>
            `,
          )
          .join("");
      }

      window.addNewQuestion = () => {
        window.questions.push({
          q: "New question?",
          a: ["Option A", "Option B", "Option C", "Option D"],
          correct: 0,
          category: "GENERAL",
          time: 30,
          points: 1000,
        });
        renderVisualEditor();
        updateJsonEditor();
        document.getElementById("total-questions").innerText =
          window.questions.length;
      };

      window.deleteQuestion = (index) => {
        window.questions.splice(index, 1);
        renderVisualEditor();
        updateJsonEditor();
        document.getElementById("total-questions").innerText =
          window.questions.length;
      };

      window.updateQuestion = (index, field, value) => {
        window.questions[index][field] = value;
        updateJsonEditor();
      };

      window.updateAnswer = (qIndex, ansIndex, value) => {
        window.questions[qIndex].a[ansIndex] = value;
        updateJsonEditor();
      };

      window.setCorrectAnswer = (qIndex, ansIndex) => {
        window.questions[qIndex].correct = ansIndex;
        updateJsonEditor();
      };

      function updateJsonEditor() {
        document.getElementById("json-editor").value = JSON.stringify(
          window.questions,
          null,
          2,
        );
      }

      window.applyJsonChanges = () => {
        try {
          const newQuestions = JSON.parse(
            document.getElementById("json-editor").value,
          );
          if (Array.isArray(newQuestions)) {
            window.questions = newQuestions;
            renderVisualEditor();
            document.getElementById("total-questions").innerText =
              window.questions.length;
            alert("Questions updated!");
          }
        } catch (e) {
          alert("Invalid JSON!");
        }
      };

      window.validateJson = () => {
        try {
          JSON.parse(document.getElementById("json-editor").value);
          alert("✓ JSON is valid!");
        } catch (e) {
          alert("✗ Invalid JSON!");
        }
      };

      window.exportQuestions = () => {
        const dataStr = JSON.stringify(window.questions, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "questions.json";
        a.click();
      };

      window.importQuestions = (input) => {
        const file = input.files[0];
        const reader = new FileReader();

        reader.onload = (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            window.questions = imported;
            renderVisualEditor();
            updateJsonEditor();
            document.getElementById("total-questions").innerText =
              window.questions.length;
            alert("Questions imported!");
          } catch (e) {
            alert("Invalid file!");
          }
        };

        reader.readAsText(file);
        input.value = "";
      };

      window.saveQuestions = async () => {
        // Save to localStorage
        localStorage.setItem(
          "customQuestions",
          JSON.stringify(window.questions),
        );

        // If in a room, save to Firebase
        if (currentRoom && isAdmin) {
          try {
            await updateDoc(doc(db, "rooms", currentRoom), {
              questions: window.questions,
            });
            alert("Questions saved to room!");
          } catch (error) {
            console.error("Failed to save to room:", error);
            alert("Saved locally only (not in room)");
          }
        } else {
          alert("Questions saved locally!");
        }

        document.getElementById("total-questions").innerText =
          window.questions.length;
      };

      window.resetToDefault = () => {
        window.questions = [
          {
            q: "What is the capital of Indonesia?",
            a: ["JAKARTA", "SURABAYA", "BANDUNG", "MEDAN"],
            correct: 0,
            category: "GEOGRAPHY",
            time: 30,
            points: 1000,
          },
          {
            q: "Who invented the light bulb?",
            a: ["TESLA", "EDISON", "BELL", "EINSTEIN"],
            correct: 1,
            category: "SCIENCE",
            time: 30,
            points: 1000,
          },
          {
            q: "Which animal can fly?",
            a: ["CAT", "DOG", "BIRD", "FISH"],
            correct: 2,
            category: "BIOLOGY",
            time: 20,
            points: 800,
          },
        ];
        renderVisualEditor();
        updateJsonEditor();
        document.getElementById("total-questions").innerText =
          window.questions.length;
        alert("Reset to default");
      };

      // Load saved questions from localStorage
      const savedQuestions = localStorage.getItem("customQuestions");
      if (savedQuestions) {
        try {
          window.questions = JSON.parse(savedQuestions);
        } catch (e) {}
      }

      // ==================== ADMIN MONITORING ====================

      window.toggleAdminPanel = () => {
        document.getElementById("admin-modal").classList.toggle("active");
      };

      window.monitorRoom = async () => {
        const roomCode = document
          .getElementById("admin-room-code")
          .value.trim()
          .toUpperCase();
        if (!roomCode) return;

        const listEl = document.getElementById("admin-participants-list");

        onSnapshot(
          collection(db, "rooms", roomCode, "participants"),
          (snapshot) => {
            const participants = [];
            snapshot.forEach((doc) => participants.push(doc.data()));

            listEl.innerHTML = participants
              .map(
                (p) => `
                    <div class="p-3 bg-black/50 border border-neon-blue">
                        <div class="font-bold">${p.name}</div>
                        <div class="text-sm">Score: ${p.score}</div>
                    </div>
                `,
              )
              .join("");
          },
        );
      };
    </script>
  </body>
</html>
